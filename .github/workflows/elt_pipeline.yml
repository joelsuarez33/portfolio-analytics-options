name: ELT Pipeline and Quantitative Model

on:
  schedule:
    - cron: '*/15 14-20 * * 1-5'
  workflow_dispatch:

jobs:
  execute-architecture:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Updated for LTS support
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create temporary GCP credential
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json

      - name: Configure dynamic dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          portfolio_finanzas:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: portfolio-analytics-eng
                dataset: mercado_financiero_dev
                threads: 4
                location: US
                keyfile: $(pwd)/gcp-key.json
          EOF

      - name: Execute Transformation Layer (dbt run)
        run: |
          dbt run --project-dir portfolio_finanzas

      - name: Execute Data Quality (dbt test)
        run: |
          dbt test --project-dir portfolio_finanzas

      - name: Execute Quantitative Engine (Python)
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python analytics/quant_models.py
